<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'home')}">

  <body>

    <h2 th:text="#{welcome}">Welcome</h2>

    <br>
    <p>Application Version: <span th:text="${applicationVersion}"> </span></p>
    <br>    
    <p>Current Date-Time: <span th:text="${currentDate}"> </span></p>

    <br>
    
    <table>
      <tbody>
        <tr>
          <td>&nbsp;HostName:</td>
          <td>&nbsp;<span th:text="${hostName}"> </span></td>
        </tr>
        <tr>
          <td>IP-Address:</td>
          <td>&nbsp;<span th:text="${ipAddress}"> </span></td>
        </tr>
        <tr>
          <td>&nbsp;&nbsp;SessionID:</td>
          <td>&nbsp;<span th:text="${sessionID}"> </span></td>
        </tr>
      </tbody>
    </table>

    <br>
    <br>
    <br>            
    <div class="row">
        <div class="col-md-12">
          <img class="img-responsive" src="../static/resources/images/pets.jpg" th:src="@{/resources/images/pets.jpg}"/>
        </div>
    </div>

  </body>

</html>
